zend_extension=xdebug.so

; Debugger only, and only when explicitly triggered (XDEBUG_TRIGGER via
; cookie / GET param / env from your IDE) — normal requests run
; uninstrumented. Add 'develop' / 'coverage' / 'profile' back temporarily
; when you actually need them; never leave 'profile' always-on (it writes a
; cachegrind file to disk on every request).
xdebug.mode=debug
xdebug.start_with_request=trigger
xdebug.idekey=docker
xdebug.client_port=9003
xdebug.client_host=host.docker.internal

; Quieter log — was log_level=7, a verbose entry per request.
xdebug.log=/tmp/xdebug.log
xdebug.log_level=1
